# Example Nginx server block for internal production deployment.
# Build first with: npm ci && npm run build
# Then set root to the absolute dist path on the server.

server {
    listen 5173;
    server_name _;

    root /opt/interface-intent/dist;
    index index.html;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://194.233.79.180:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host 194.233.79.180:8080;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /chat-webhook {
        proxy_pass http://103.140.90.131:5678/webhook/eb70bb74-2714-4d79-b447-de3e7cd683cb/chat;
        proxy_http_version 1.1;
        proxy_set_header Host 103.140.90.131:5678;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /vector-webhook {
        proxy_pass http://103.140.90.131:5678/webhook/update-intent;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host 103.140.90.131:5678;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
